<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Q Plus AR-test</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #uitleg {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      width: calc(100% - 48px);
      max-width: 520px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.72);
      color: white;
      text-align: center;
      pointer-events: none;
    }

    #verzamelknop {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 10000;
      display: none;
      width: calc(100% - 48px);
      max-width: 420px;
      padding: 18px;
      border: 0;
      border-radius: 12px;
      background: #1689d8;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,.3);
      touch-action: manipulation;
    }

    #melding {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 10000;
      display: none;
      width: calc(100% - 48px);
      max-width: 420px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(255,255,255,.97);
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 18px rgba(0,0,0,.3);
    }
  </style>
</head>

<body>
  <div id="uitleg">Richt de camera op de herkenningsafbeelding.</div>
  <button id="verzamelknop" type="button">VERZAMEL OBJECT</button>
  <div id="melding">✓ Object gevonden!</div>

  <a-scene
    mindar-image="imageTargetSrc: ./target.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-entity id="object-groep">
        <a-box
          position="0 0 0.15"
          scale="0.45 0.45 0.45"
          material="color: #1689d8; opacity: 0.9"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>

        <a-text
          value="GEVONDEN"
          align="center"
          color="#ffffff"
          position="0 -0.65 0.08"
          scale="0.45 0.45 0.45">
        </a-text>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      const target = document.querySelector('#target');
      const groep = document.querySelector('#object-groep');
      const knop = document.querySelector('#verzamelknop');
      const melding = document.querySelector('#melding');
      const uitleg = document.querySelector('#uitleg');

      let verzameld = false;

      target.addEventListener('targetFound', function () {
        if (!verzameld) {
          knop.style.display = 'block';
          uitleg.textContent = 'Object gevonden. Druk op de knop om het te verzamelen.';
        }
      });

      target.addEventListener('targetLost', function () {
        if (!verzameld) {
          knop.style.display = 'none';
          uitleg.textContent = 'Richt de camera opnieuw op de herkenningsafbeelding.';
        }
      });

      knop.addEventListener('click', function () {
        if (verzameld) return;
        verzameld = true;

        knop.style.display = 'none';
        melding.style.display = 'block';
        uitleg.textContent = 'De test is geslaagd.';

        groep.setAttribute('animation__verdwijn', {
          property: 'scale',
          to: '0 0 0',
          dur: 400,
          easing: 'easeInBack'
        });

        setTimeout(function () {
          groep.setAttribute('visible', 'false');
        }, 400);
      });
    });
  </script>
</body>
</html>
