<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Q Plus AR-test</title>

  <!-- Gratis bibliotheken via CDN -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #melding {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      width: calc(100% - 48px);
      max-width: 420px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,.95);
      text-align: center;
      font-weight: bold;
      box-shadow: 0 4px 18px rgba(0,0,0,.25);
    }
    #uitleg {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: calc(100% - 48px);
      max-width: 520px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,.72);
      color: white;
      text-align: center;
    }
  </style>

  <script>
    AFRAME.registerComponent('verzamelbaar', {
      init: function () {
        const object = this.el;
        const melding = document.querySelector('#melding');

        object.addEventListener('click', () => {
          melding.style.display = 'block';
          object.setAttribute('animation', {
            property: 'scale',
            to: '0 0 0',
            dur: 350,
            easing: 'easeInBack'
          });
          setTimeout(() => object.setAttribute('visible', 'false'), 350);
        });
      }
    });
  </script>
</head>

<body>
  <div id="uitleg">Richt de camera op uw herkenningsafbeelding en tik op het blauwe object.</div>
  <div id="melding">✓ Object gevonden!</div>

  <a-scene
    mindar-image="imageTargetSrc: ./target.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"
              cursor="fuse: false; rayOrigin: mouse;"
              raycaster="objects: .klikbaar"></a-camera>

    <!-- targetIndex 0 = de eerste afbeelding in target.mind -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Eenvoudig gratis testobject; nog geen 3D-model nodig -->
      <a-box
        class="klikbaar"
        verzamelbaar
        position="0 0 0.15"
        rotation="0 0 0"
        scale="0.45 0.45 0.45"
        material="color: #1689d8; opacity: 0.9"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>

      <a-text
        value="TIK MIJ"
        align="center"
        color="#ffffff"
        position="0 -0.65 0.05"
        scale="0.5 0.5 0.5">
      </a-text>

    </a-entity>
  </a-scene>
</body>
</html>
