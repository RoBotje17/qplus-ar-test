<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Q Plus AR-test</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body{margin:0;overflow:hidden;font-family:Arial,sans-serif}
    #uitleg,#melding{position:fixed;left:50%;transform:translateX(-50%);z-index:9999;width:calc(100% - 48px);max-width:520px;padding:12px;border-radius:10px;text-align:center;pointer-events:none}
    #uitleg{top:12px;background:rgba(0,0,0,.72);color:#fff}
    #melding{bottom:24px;display:none;background:rgba(255,255,255,.96);font-weight:bold;box-shadow:0 4px 18px rgba(0,0,0,.25)}
  </style>
  <script>
    AFRAME.registerComponent('verzamelbaar', {
      init: function () {
        const klikvlak = this.el;
        const groep = document.querySelector('#object-groep');
        const melding = document.querySelector('#melding');
        let klaar = false;

        function verzamel() {
          if (klaar) return;
          klaar = true;
          melding.style.display = 'block';
          groep.setAttribute('animation', {
            property: 'scale',
            to: '0 0 0',
            dur: 350,
            easing: 'easeInBack'
          });
          setTimeout(() => groep.setAttribute('visible', 'false'), 350);
        }

        klikvlak.addEventListener('click', verzamel);
        klikvlak.addEventListener('touchstart', verzamel, {passive:true});
      }
    });
  </script>
</head>
<body>
  <div id="uitleg">Richt de camera op de herkenningsafbeelding en tik op het blauwe object.</div>
  <div id="melding">✓ Object gevonden!</div>

  <a-scene
    mindar-image="imageTargetSrc: ./target.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      cursor="rayOrigin: mouse; fuse: false"
      raycaster="objects: .klikbaar">
    </a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity id="object-groep">
        <a-box
          position="0 0 0.15"
          scale="0.45 0.45 0.45"
          material="color: #1689d8; opacity: 0.9"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>

        <a-text
          value="TIK MIJ"
          align="center"
          color="#ffffff"
          position="0 -0.65 0.08"
          scale="0.5 0.5 0.5">
        </a-text>

        <a-plane
          class="klikbaar"
          verzamelbaar
          position="0 0 0.4"
          width="1.5"
          height="1.5"
          material="color: #ffffff; opacity: 0.001; transparent: true; side: double">
        </a-plane>
      </a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
